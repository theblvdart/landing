<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Journal | THE BLVD</title>
<meta name="description" content="Cultural intelligence on contemporary art, collectibles, fashion and design.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,380..520&family=Archivo:wght@400;500;600&family=Roboto+Condensed:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="nav">
  <div class="wrap">
    <a href="index.html" class="nav-mark">BLVD.</a>
    <div class="nav-links">
      <a href="radar.html" data-nav="radar">The Radar</a>
      <a href="journal.html" data-nav="journal">Journal</a>
      <a href="source.html" data-nav="source">Source</a>
      <a href="request.html" class="nav-cta" data-nav="request">Request a search</a>
    </div>
    <button class="nav-toggle" aria-label="Open menu">
      <svg width="22" height="14" viewBox="0 0 22 14"><rect width="22" height="1.5" fill="currentColor"/><rect y="12.5" width="22" height="1.5" fill="currentColor"/></svg>
    </button>
  </div>
</nav>

<div class="mobile-menu">
  <div class="mobile-menu-top">
    <span class="nav-mark">BLVD.</span>
    <button class="mobile-menu-close" aria-label="Close menu">
      <svg width="20" height="20" viewBox="0 0 20 20"><line x1="1" y1="1" x2="19" y2="19" stroke="currentColor" stroke-width="1.5"/><line x1="19" y1="1" x2="1" y2="19" stroke="currentColor" stroke-width="1.5"/></svg>
    </button>
  </div>
  <a href="radar.html" data-nav="radar">The Radar</a>
  <a href="journal.html" data-nav="journal">Journal</a>
  <a href="source.html" data-nav="source">Source</a>
  <a href="request.html" data-nav="request">Request a Search</a>
</div>

<header class="page-header on-dark">
  <div class="wrap">
    <div class="eyebrow" id="page-eyebrow"></div>
    <h1 class="h-display" id="page-heading" style="margin-top:14px; max-width:14ch;"></h1>
    <p class="lede" id="page-subheading" style="margin-top:22px;"></p>
  </div>
</header>

<section class="section-tight on-dark" id="featured-article-wrap"></section>

<section class="section on-dark">
  <div class="wrap">
    <div class="eyebrow" id="articles-eyebrow"></div>
    <div class="article-list" id="article-list"></div>
  </div>
</section>

<section class="section-tight on-light cta-band">
  <div class="wrap">
    <div class="eyebrow on-light" id="cta-eyebrow"></div>
    <h2 class="h-1" id="cta-heading" style="margin-top:14px; max-width:20ch;"></h2>
    <a href="request.html" class="btn btn-primary" style="margin-top:30px;"><span id="cta-button"></span> <span class="btn-arrow">→</span></a>
  </div>
</section>

<footer class="footer on-dark">
  <div class="wrap">
    <div>
      <div class="footer-mark">BLVD.</div>
      <div class="footer-fine">© <span id="year"></span> <span data-bind="site-name"></span>. <span data-bind="site-tagline"></span></div>
    </div>
    <div class="footer-links">
      <a href="https://www.instagram.com/theblvd.art/" data-footer="instagram" target="_blank" rel="noopener">Instagram</a>
      <a href="mailto:info@theblvd.art" data-footer="email">Email</a>
      <a href="request.html" data-footer="contact">Contact</a>
      <a href="mailto:info@theblvd.art?subject=Newsletter%20signup&body=Please%20add%20me%20to%20the%20BLVD%20newsletter." data-footer="newsletter">Newsletter</a>
    </div>
  </div>
</footer>

<script src="main.js"></script>
<script>
  document.getElementById("year").textContent = new Date().getFullYear();

  BLVD.loadContent().then(({journal, site, pages}) => {
    BLVD.hydrateChrome(site);
    const p = pages.journal;

    BLVD.setText("page-eyebrow", p.eyebrow);
    BLVD.setText("page-heading", p.heading);
    BLVD.setText("page-subheading", p.subheading);
    BLVD.setText("articles-eyebrow", p.articlesEyebrow);
    BLVD.setText("cta-eyebrow", p.ctaEyebrow);
    BLVD.setText("cta-heading", p.ctaHeading);
    BLVD.setText("cta-button", p.ctaButton);

    const featured = journal.find(a => a.featured) || journal[0];
    const rest = journal.filter(a => a.slug !== featured.slug);

    document.getElementById("featured-article-wrap").innerHTML = `
      <div class="wrap">
        <a class="feature-article" href="article.html?slug=${featured.slug}">
          <div>
            <span class="tag">${featured.category}</span>
            <h2 class="h-1" style="margin-top:14px;">${featured.title}</h2>
            <p class="lede" style="margin-top:18px;">${featured.excerpt}</p>
            <div style="margin-top:24px; display:flex; gap:18px; align-items:center;">
              <span class="date mono-num" style="color:var(--ash);">${BLVD.formatDate(featured.date)}</span>
              <div class="card-link"><span>Read \u2192</span></div>
            </div>
          </div>
          ${BLVD.ph(featured, {cls:"wide"})}
        </a>
      </div>`;

    document.getElementById("article-list").innerHTML =
      rest.map(BLVD.articleRowHTML).join("");
  });
</script>
</body>
</html>
